    note: "Phase 31 / DESIGN §24.5: pre-bind a port in the allocator's band via a host python listener; `ssg run` MUST allocate the next free port in the band, NOT the pre-bound one. Validates `virtual_port_allocator::allocate_or_reuse`'s `probe_port_free` skip."
