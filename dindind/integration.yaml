    timeout: 600
    note: "Phase 31 / DESIGN §24.5: the project's virtual port survives `ssg build` + `ssg run` and `ssg stop` + `ssg run` cycles. Only `ssg rm --with-data` releases the allocation. Anchors the consumer-stability invariant for Phase 28."
