  # --- Phase 33: SSG-native [secrets.<name>] support ---
  # `Coastfile.shared_service_groups` accepts the same `[secrets.*]`
  # block as the regular Coastfile. `coast ssg build` extracts via
  # the existing extractor registry and stores values encrypted in
  # the keystore under `coast_image = "ssg:<project>"`.
  # `coast ssg run` decrypts and writes a per-run
  # `compose.override.yml` that compose layers on top of
  # `/coast-artifact/compose.yml`. Keystore is never auto-purged —
  # only `coast ssg secrets clear` removes entries.
  test_ssg_secrets_env_inject:
    script: integrated-examples/test_ssg_secrets_env_inject.sh
    timeout: 600
    note: "[secrets.*] with env extractor + env inject lands in the postgres container as POSTGRES_PASSWORD via compose.override.yml"
