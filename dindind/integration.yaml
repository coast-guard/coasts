    timeout: 600
    note: "ssg rm and ssg rm --with-data leave the keystore alone; only `ssg secrets clear` removes SSG keystore rows"
  test_ssg_secrets_clear:
    script: integrated-examples/test_ssg_secrets_clear.sh
    timeout: 600
    note: "explicit `ssg secrets clear` empties keystore for ssg:<project>; idempotent; doctor surfaces info finding when declared but missing"

