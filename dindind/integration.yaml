    note: "Phase 25 local analogue of test_remote_two_projects_same_canonical_port_distinct_ssg: two projects each own SSG (pg15 vs pg16), both consumer coasts run locally against the same canonical postgres:5432; psql SHOW server_version confirms each consumer reaches its OWN project's postgres (DESIGN §23, Phase 25)"

  # --- Shared Service Groups (coast-ssg) — Phase 23 (consumer resolver + `from_group`) ---
  test_ssg_per_project_build_isolation:
    script: integrated-examples/test_ssg_per_project_build_isolation.sh
    timeout: 600
    note: "project A's `ssg build` is invisible to project B's consumer; `coast build` in B hard-errors naming project B instead of silently picking up A's build via the old global `latest` symlink (DESIGN §23, Phase 23)"

  # --- Shared Service Groups (coast-ssg) — Phase 31 (host-owned virtual ports) ---
  test_ssg_virtual_port_stable_across_rebuild:
