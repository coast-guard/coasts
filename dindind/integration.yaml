# Integration test matrix for DinD runner.
#
# scenarios: Linux environments to run tests in.
# tests:     Map of test name -> script path + optional scenario override.
#
# Usage:
#   ./dindind/integration-runner.sh test_egress
#   ./dindind/integration-runner.sh all
#   make run-dind-integration TEST=test_egress

scenarios:
