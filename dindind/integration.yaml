    note: "Phase 30: two instances of the SAME project on the SAME remote VM share ONE `ssh -R` process for SSG-backed shared services. Asserts (1) exactly one ssh -R for the project's vport regardless of instance count, (2) reuse-don't-respawn across `coast run`, (3) shared tunnel survives an intermediate `coast rm` while a sibling holds it, (4) tear-down only when the last sibling is removed (DESIGN §24, Phase 30)."
